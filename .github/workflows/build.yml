name: Build libdave

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev nlohmann-json3-dev ninja-build curl zip unzip tar pkg-config

      - name: Show structure
        run: |
          echo "=== Makefile ==="
          cat ./cpp/Makefile
          echo "=== vcpkg-alts ==="
          ls -la ./cpp/vcpkg-alts/
          find ./cpp/vcpkg-alts -name "*.cmake" -o -name "portfile.cmake" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libdave-linux
          path: cpp/build/**/*.so
