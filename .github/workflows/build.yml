name: Build libdave

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev nlohmann-json3-dev ninja-build curl zip unzip tar pkg-config

      - name: Show CMakeLists
        run: |
          echo "=== Full CMakeLists.txt ==="
          cat ./cpp/CMakeLists.txt
          echo "=== cpp folder structure ==="
          ls -la ./cpp/
          echo "=== Any mlspp references ==="
          grep -r "mlspp\|MLSPP" ./cpp/CMakeLists.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libdave-linux
          path: cpp/build/**/*.so
