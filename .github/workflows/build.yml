name: Build libdave

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libssl-dev nlohmann-json3-dev ninja-build curl zip unzip tar pkg-config

      - name: Show repo structure
        run: |
          echo "=== vcpkg.json ==="
          cat ./cpp/vcpkg.json 2>/dev/null || echo "NOT FOUND"
          echo "=== CMakeLists.txt deps ==="
          grep -i "mlspp\|find_package\|find_dependency" ./cpp/CMakeLists.txt
          echo "=== ports folder ==="
          ls ./cpp/vcpkg/ports/ | grep -i mls || echo "no mls ports"
          echo "=== All ports ==="
          ls ./cpp/vcpkg/ports/ 2>/dev/null | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libdave-linux
          path: cpp/build/**/*.so
